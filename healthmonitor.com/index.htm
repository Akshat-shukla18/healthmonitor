<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Monitor</title>

<link rel="stylesheet" href="styles.css">
<script src="script.js"></script>
</head>

<body>

<!-- BUBBLES -->
<div class="bubbles">
  <span></span><span></span><span></span>
  <span></span><span></span><span></span>
</div>

<!-- NAVBAR -->
<header>
    <div class="logo">🩺 HealthMonitor</div>

    <div class="nav">
        <button onclick="location.href='index.html'">Home</button>
        <button onclick="location.href='about.html'">About</button>
        <button onclick="location.href='contact.html'">Contact</button>
    </div>

    <div id="profileSection">
        <img id="profilePic" src="" style="display:none;">
        <span id="profileName">Guest</span>
    </div>
</header>

<!-- HERO -->
<div class="hero">

    <!-- LEFT -->
    <div class="left">
        <img src="images.jpeg" alt="Doctor">
        <h2>Your Health, Simplified</h2>
        <p>Analyze your medical reports instantly with smart insights.</p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="container">

            <h1>Health Monitor</h1>

            <form id="healthForm">

                <label>Heart Rate (bpm)</label>
                <input type="number" id="heartRate" required>

                <label>Blood Pressure</label>
                <input type="text" id="bloodPressure" placeholder="120/80" required>

                <label>Blood Sugar</label>
                <input type="number" id="bloodSugar" required>

                <label>Hemoglobin</label>
                <input type="number" id="hemoglobin" required>

                <button type="button" onclick="checkHealth()">
                    Analyze Report
                </button>
            </form>

            <div id="result">
                <h3>Report Output</h3>
                <p>Your results will appear here...</p>
            </div>

        </div>
    </div>

</div>

</body>
</html>
